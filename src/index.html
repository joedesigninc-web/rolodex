<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rolodex</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="window">
  <div class="titlebar" data-tauri-drag-region>
    <div class="dot r" id="btnClose"></div>
    <div class="dot y" id="btnMin"></div>
    <div class="dot g" id="btnZoom"></div>
    <div class="app-title">Rolodex</div>
    <div class="import-btn" id="btnImport" title="Import vCard">Import</div>
  </div>
  <div class="search">
    <input id="search" placeholder="Search" />
    <div class="datetime" id="datetime"></div>
  </div>
  <div class="body">
    <div class="stage" id="stage"></div>
    <div class="index" id="index"></div>
  </div>
  <div class="footer" id="footer"></div>
</div>
<div class="empty-overlay" id="emptyOverlay">
  <p class="empty-title">No contacts yet</p>
  <p class="empty-body" id="emptyBody">Import a vCard exported from Contacts.app to get started.</p>
  <div class="empty-btn" id="btnImportEmpty">Import vCard&hellip;</div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
