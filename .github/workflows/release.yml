name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin --bundles dmg'
          - platform: 'windows-latest'
            args: '--bundles nsis msi'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Rolodex ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below. These builds are not code-signed, so macOS/Windows will show an "unidentified developer" warning on first launch.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
